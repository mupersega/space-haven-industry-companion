name: Deploy to GitHub Pages

# Build the site and publish it to GitHub Pages on every push to master.
# Also runnable on demand from the Actions tab.
on:
  push:
    branches: [master]
  workflow_dispatch:

# Least-privilege token, plus what deploy-pages needs to publish.
permissions:
  contents: read
  pages: write
  id-token: write

# One live deploy at a time; a newer push cancels an in-flight run.
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      # enablement:true turns Pages on (GitHub Actions source) from the workflow
      # itself, so a brand-new repo needs no manual Settings toggle.
      - uses: actions/configure-pages@v5
        with:
          enablement: true
      # npm install, not npm ci: the lockfile is generated on Windows and omits
      # the Linux-only @emnapi/@napi-rs optional deps that Rolldown pulls in, so
      # strict `npm ci` rejects it. `npm install` honours the lockfile where it
      # is in sync and reconciles those optional deps for the runner's platform.
      - run: npm install --no-audit --no-fund
      - run: npm run build
      - uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
