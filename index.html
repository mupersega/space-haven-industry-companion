<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#1a1628" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🛰️</text></svg>" />

    <title>Space Haven Production & Industry Calculator</title>
    <meta
      name="description"
      content="Free Space Haven production calculator and industry planner. Map crafting recipes, true trade values, and the profit margin on every item you fabricate."
    />
    <link rel="canonical" href="https://s-h-buddy.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph: Discord, Facebook, Slack, and most link unfurlers read these
         from static HTML (they do not run JavaScript), so they live here rather
         than being set by the app. -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Space Haven Industry Companion" />
    <meta property="og:title" content="Space Haven Production & Industry Calculator" />
    <meta
      property="og:description"
      content="Map crafting recipes, true trade values, and the profit margin on every item you fabricate in Space Haven."
    />
    <meta property="og:url" content="https://s-h-buddy.com/" />
    <meta property="og:image" content="https://s-h-buddy.com/og-cover.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta
      property="og:image:alt"
      content="A Space Haven colony fleet warping in past a planet, on the Industry Companion landing scene."
    />

    <!-- Twitter / X card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Space Haven Production & Industry Calculator" />
    <meta
      name="twitter:description"
      content="Map crafting recipes, true trade values, and the profit margin on every item you fabricate in Space Haven."
    />
    <meta name="twitter:image" content="https://s-h-buddy.com/og-cover.jpg" />

    <!-- Structured data: tells search engines this is a free web app, and ties it
         to the game so it surfaces for Space Haven queries. -->
    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebApplication",
        "name": "Space Haven Industry Companion",
        "alternateName": "Space Haven Production Ledger",
        "url": "https://s-h-buddy.com/",
        "description": "Free Space Haven production calculator and industry planner. Map crafting recipes, true trade values, and the profit margin on every item you fabricate.",
        "applicationCategory": "GameApplication",
        "operatingSystem": "Any (web browser)",
        "browserRequirements": "Requires JavaScript.",
        "isAccessibleForFree": true,
        "offers": { "@type": "Offer", "price": "0", "priceCurrency": "USD" },
        "about": {
          "@type": "VideoGame",
          "name": "Space Haven",
          "publisher": { "@type": "Organization", "name": "Bugbyte Ltd" }
        }
      }
    </script>
    <!-- paint dark from the very first frame — kills the white flash before the
         CSS bundle loads. color-scheme keeps the browser's own default surface
         (and scrollbars) dark too. -->
    <style>
      :root {
        color-scheme: dark;
      }
      html,
      body {
        margin: 0;
        background: #1a1628;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- Crawlable fallback for scrapers that do not execute JavaScript. The live
         app replaces #root on mount, so this is never seen by real visitors. -->
    <noscript>
      <h1>Space Haven Production &amp; Industry Calculator</h1>
      <p>
        A free companion tool for the game Space Haven: map production chains and
        crafting recipes, read the true trade value of every resource, and work out
        the profit margin on each item you fabricate. This interactive planner needs
        JavaScript enabled.
      </p>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
